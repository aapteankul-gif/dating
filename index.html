<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveConnect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>❤️ LoveConnect</h1>
</header>

<div class="container">

    <div class="card">
        <img id="profileImg" src="https://picsum.photos/350/400?random=1">

        <div class="info">
            <h2 id="name">Sophia, 24</h2>
            <p id="bio">Loves traveling, coffee and adventures.</p>
        </div>

        <div class="buttons">
            <button class="dislike" onclick="nextProfile()">❌ Pass</button>
            <button class="like" onclick="likeProfile()">❤️ Like</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
